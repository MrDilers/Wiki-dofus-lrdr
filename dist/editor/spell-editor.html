<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editeur de sorts - LRDR</title>
    <link rel="stylesheet" href="spell-editor.css?v=5">
  </head>
  <body>
    <main class="editor-shell">
      <header class="editor-header">
        <div>
          <h1>Editeur de sorts</h1>
        </div>
        <div class="header-actions">
          <button id="openLocalFile" type="button">Ouvrir fichier local</button>
          <button id="saveLocalFile" type="button" disabled>Sauver localement</button>
          <button id="downloadFile" type="button">Telecharger</button>
          <button id="copyFile" type="button">Copier</button>
        </div>
      </header>

      <section class="publish-panel">
        <div>
          <p class="eyebrow">Publication GitHub</p>
          <h2>Publication directe</h2>
          <p>Quand le token est renseigne, le bouton <strong>Appliquer</strong> met a jour le fichier des sorts sur GitHub.</p>
        </div>
        <label class="token-field">
          Token GitHub
          <input id="githubToken" type="password" autocomplete="off" placeholder="github_pat_...">
        </label>
        <label class="publish-toggle">
          <input id="autoPublish" type="checkbox" checked>
          Publier quand je clique sur Appliquer
        </label>
        <div class="publish-actions">
          <button id="saveGithubToken" type="button">Garder le token</button>
          <button id="clearGithubToken" type="button">Oublier</button>
          <button id="publishGithub" type="button">Publier maintenant</button>
        </div>
      </section>

      <section class="editor-grid">
        <aside class="sidebar-panel">
          <label>
            Classe
            <select id="classSelect"></select>
          </label>
          <label>
            Sort
            <select id="spellSelect"></select>
          </label>
          <div id="spellList" class="spell-list"></div>
        </aside>

        <form id="spellForm" class="form-panel">
          <div class="form-head">
            <div>
              <p class="eyebrow">Fiche selectionnee</p>
              <h2 id="formTitle">Sort</h2>
            </div>
            <button id="applySpell" type="submit">Appliquer</button>
          </div>

          <div class="field-grid">
            <label>Identifiant <input id="fieldId" name="id"></label>
            <label>Nom <input id="fieldName" name="name"></label>
            <label>Element
              <select id="fieldElement" name="element">
                <option>Neutre</option>
                <option>Terre</option>
                <option>Feu</option>
                <option>Eau</option>
                <option>Air</option>
              </select>
            </label>
            <label>Niveau requis <input id="fieldRequiredLevel" name="requiredLevel"></label>
            <label>Niveau affiche <input id="fieldSelectedLevel" name="selectedLevel"></label>
            <label>Portee <input id="fieldRange" name="range"></label>
            <label>PA <input id="fieldAp" name="ap"></label>
            <label>Icone <input id="fieldIcon" name="icon"></label>
            <label class="wide" hidden>Source PDF <input id="fieldSourceImage" name="sourceImage"></label>
            <label class="wide">Description <textarea id="fieldDescription" name="description" rows="4"></textarea></label>
          </div>

          <div class="textarea-grid">
            <label>
              Effets normaux
              <small>Format : Element | Texte | Meta optionnelle</small>
              <textarea id="fieldNormalEffects" rows="7"></textarea>
            </label>
            <label>
              Effets critiques
              <small>Meme format, laisse vide si aucun effet.</small>
              <textarea id="fieldCriticalEffects" rows="7"></textarea>
            </label>
            <label>
              Caracteristiques
              <small>Format : Libelle | Valeur</small>
              <textarea id="fieldCharacteristics" rows="7"></textarea>
            </label>
            <label>
              Regles
              <small>Format : Libelle | true / false / valeur</small>
              <textarea id="fieldRules" rows="7"></textarea>
            </label>
          </div>
        </form>

        <section class="preview-panel">
          <div class="preview-head">
            <p class="eyebrow">Apercu</p>
            <span id="statusText">Pret</span>
          </div>
          <div id="spellPreview"></div>
          <div class="source-tools" hidden>
            <button id="toggleSourceFrame" type="button">Image PDF en cadre</button>
            <button id="openSourcePopup" type="button">Image PDF en pop-up</button>
          </div>
          <section id="sourceFrame" class="source-frame" hidden>
            <div class="source-frame-head">
              <strong>Image PDF du sort</strong>
              <button id="closeSourceFrame" type="button">Masquer</button>
            </div>
            <button id="sourceImageButton" class="source-image-button" type="button" aria-label="Ouvrir l'image PDF en pop-up">
              <img id="sourceImagePreview" alt="">
            </button>
            <small id="sourcePath"></small>
          </section>
        </section>
      </section>
    </main>

    <dialog id="sourceDialog" class="source-dialog">
      <button id="closeSourceDialog" class="source-dialog-close" type="button" aria-label="Fermer">x</button>
      <img id="sourceDialogImage" alt="">
      <p id="sourceDialogCaption"></p>
    </dialog>

    <script src="../data/spell-panels.js"></script>
    <script>
      document.write('<script src="../data/spells-custom.js?v=' + Date.now() + '"><\/script>');
    </script>
    <script src="spell-editor.js?v=5"></script>
  </body>
</html>

<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wiki LRDR - Guides</title>
    <link rel="stylesheet" href="assets/styles.css?v=23">
  </head>
  <body>
    <aside class="sidebar">
      <a class="brand" href="index.html" aria-label="Accueil">
        <span class="brand-mark">LR</span>
        <span>
          <strong>La Revanche de Retro</strong>
          <small>Wiki Dofus 1.34</small>
        </span>
      </a>
      <nav id="siteNav" class="nav" aria-label="Menu principal"></nav>
    </aside>

    <main id="top" class="shell">
      <section class="category-hero wiki-hero">
        <div>
          <p class="eyebrow">Guides serveur</p>
          <h1>Wiki general</h1>
          <p class="lead">Panoplies, bonus, PNJ et systemes propres a La Revanche de Retro.</p>
        </div>
        <div class="hero-panel">
          <span id="wikiCount">Guides</span>
          <strong>Base serveur</strong>
        </div>
      </section>

      <section class="toolbar" aria-label="Recherche et filtres">
        <label class="search">
          <span>Recherche</span>
          <input id="wikiSearchInput" type="search" placeholder="Panoplie, PNJ, bonus, ressource...">
        </label>
        <div id="wikiFilters" class="chips" aria-label="Filtres wiki"></div>
      </section>

      <section id="wikiSections" class="wiki-sections" aria-live="polite"></section>
    </main>

    <dialog id="imageDialog" class="image-dialog" aria-label="Agrandissement image">
      <button id="closeImageDialog" class="icon-button image-dialog-close" aria-label="Fermer">x</button>
      <img id="imageDialogImg" alt="">
      <p id="imageDialogCaption"></p>
    </dialog>

    <script src="data/wiki-data.js"></script>
    <script src="data/wiki-content.js"></script>
    <script src="assets/app.js?v=20"></script>
  </body>
</html>

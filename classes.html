<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wiki LRDR - Classes</title>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <aside class="sidebar">
      <a class="brand" href="index.html" aria-label="Accueil">
        <span class="brand-mark">LR</span>
        <span>
          <strong>La Revanche de Rétro</strong>
          <small>Wiki Dofus 1.34</small>
        </span>
      </a>
      <nav id="classNav" class="nav" aria-label="Menu principal"></nav>
    </aside>

    <main id="top" class="shell">
      <section id="classes" class="category-hero">
        <div>
          <p class="eyebrow">Catégorie</p>
          <h1>Classes</h1>
        </div>
        <div class="hero-panel">
          <span id="classCount">12 classes</span>
          <strong>Sorts modifiés</strong>
        </div>
      </section>

      <section class="toolbar" aria-label="Recherche et filtres">
        <label class="search">
          <span>Recherche</span>
          <input id="searchInput" type="search" placeholder="Sort, élément, rôle, classe...">
        </label>
        <div id="elementFilters" class="chips" aria-label="Filtres éléments"></div>
      </section>

      <section id="classesGrid" class="classes-grid" aria-live="polite"></section>
    </main>

    <dialog id="classDialog" class="dialog">
      <button id="closeDialog" class="icon-button" aria-label="Fermer">×</button>
      <div id="dialogContent"></div>
    </dialog>

    <script src="data/wiki-data.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>

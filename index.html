<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wiki LRDR</title>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <aside class="sidebar">
      <a class="brand" href="#home" aria-label="Accueil">
        <span class="brand-mark">LR</span>
        <span>
          <strong>La Revanche de Rétro</strong>
          <small>Wiki Dofus 1.34</small>
        </span>
      </a>
      <nav id="classNav" class="nav" aria-label="Menu principal"></nav>
    </aside>

    <main id="top" class="shell">
      <section id="home" class="home-page">
        <section class="hero">
          <div>
            <p class="eyebrow">Serveur privé Dofus 1.34</p>
            <h1>Wiki La Revanche de Rétro</h1>
          </div>
          <div class="hero-panel">
            <span id="classCount">12 classes</span>
            <strong>Base de données</strong>
          </div>
        </section>

        <section class="home-categories" aria-label="Catégories du wiki">
          <a class="home-card is-ready" href="#classes">
            <span>01</span>
            <strong>Classes</strong>
            <small id="homeClassCount">12 fiches</small>
          </a>
          <div class="home-card is-disabled">
            <span>02</span>
            <strong>Equipements</strong>
            <small>A venir</small>
          </div>
          <div class="home-card is-disabled">
            <span>03</span>
            <strong>Donjons</strong>
            <small>A venir</small>
          </div>
          <div class="home-card is-disabled">
            <span>04</span>
            <strong>Autres guides</strong>
            <small>A venir</small>
          </div>
        </section>
      </section>

      <section id="classes" class="section-head">
        <p class="eyebrow">Catégorie</p>
        <h2>Classes</h2>
      </section>

      <section class="toolbar" aria-label="Recherche et filtres">
        <label class="search">
          <span>Recherche</span>
          <input id="searchInput" type="search" placeholder="Sort, élément, rôle, classe...">
        </label>
        <div id="elementFilters" class="chips" aria-label="Filtres éléments"></div>
      </section>

      <section id="classesGrid" class="classes-grid" aria-live="polite"></section>
    </main>

    <dialog id="classDialog" class="dialog">
      <button id="closeDialog" class="icon-button" aria-label="Fermer">×</button>
      <div id="dialogContent"></div>
    </dialog>

    <script src="data/wiki-data.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>
